<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Global Cake & Bakery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FFF8F0;
      padding: 20px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #E84C3D;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    h1 { color: #2D2D2D; font-size: 20px; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    button {
      background: #E84C3D;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="45" r="28" fill="#F5DEB3"/>
      <ellipse cx="50" cy="40" rx="18" ry="14" fill="#D4A574"/>
    </svg>
  </div>
  <h1>Anda Sedang Offline</h1>
  <p>Periksa koneksi internet Anda dan coba lagi untuk melanjutkan belanja di Global Cake & Bakery.</p>
  <button onclick="location.reload()">Coba Lagi</button>
</body>
</html>
